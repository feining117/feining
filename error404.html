<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERROR 404</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #f2f2f2;
      color: #222;
      font-family:
        -apple-system, BlinkMacSystemFont,
        "Segoe UI", "PingFang SC", "Hiragino Sans GB",
        "Microsoft YaHei", sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 28px;
    }

    .page {
      width: min(1120px, 100%);
      background: #fff;
      border: 1px solid #dcdcdc;
      min-height: 640px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.05);
    }

    .browser-bar {
      height: 50px;
      border-bottom: 1px solid #e6e6e6;
      background: #fafafa;
      display: flex;
      align-items: center;
      padding: 0 14px;
      color: #888;
      font-size: 14px;
      gap: 10px;
    }

    .browser-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #d7d7d7;
      flex: 0 0 auto;
    }

    .browser-address {
      margin-left: 6px;
      flex: 1;
      border: 1px solid #dddddd;
      border-radius: 14px;
      height: 30px;
      display: flex;
      align-items: center;
      padding: 0 13px;
      font-size: 13px;
      color: #9a9a9a;
      background: #fff;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      letter-spacing: 0.4px;
    }

    .content {
      padding: 72px 72px 78px;
      min-height: 590px;
    }

    .error-block {
      display: flex;
      align-items: flex-start;
      gap: 22px;
      margin-bottom: 30px;
    }

    .bang {
      font-size: 82px;
      line-height: 0.9;
      font-weight: 500;
      letter-spacing: 1px;
      font-family: "Courier New", monospace;
      padding-top: 2px;
    }

    .code-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .code-top,
    .code-bottom {
      font-size: 68px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: 1px;
      font-family: "Courier New", monospace;
    }

    .message {
      font-size: 28px;
      line-height: 1.75;
      margin: 0;
      color: #2a2a2a;
      white-space: pre-line;
    }

    .subhead {
      font-size: 22px;
      line-height: 1.9;
      margin: 34px 0 10px;
      font-weight: 600;
      color: #333;
      white-space: pre-line;
    }

    .staff {
      margin: 0 0 0 0;
      padding-left: 1.35em;
      font-size: 22px;
      line-height: 2;
      color: #333;
    }

    .staff li {
      margin: 0;
    }

    .ending {
      margin-top: 160px;
      font-size: 24px;
      line-height: 1.9;
      color: #2a2a2a;
      white-space: pre-line;
    }

    @media (max-width: 900px) {
      .content {
        padding: 50px 38px 60px;
        min-height: auto;
      }

      .bang {
        font-size: 62px;
      }

      .code-top,
      .code-bottom {
        font-size: 52px;
      }

      .message {
        font-size: 22px;
      }

      .subhead,
      .staff {
        font-size: 18px;
      }

      .ending {
        font-size: 20px;
        margin-top: 100px;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .browser-bar {
        height: 46px;
      }

      .content {
        padding: 36px 22px 48px;
      }

      .error-block {
        gap: 14px;
      }

      .bang {
        font-size: 46px;
      }

      .code-top,
      .code-bottom {
        font-size: 40px;
      }

      .message {
        font-size: 18px;
      }

      .subhead,
      .staff {
        font-size: 16px;
      }

      .ending {
        font-size: 18px;
        margin-top: 72px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="browser-bar">
      <div class="browser-dot"></div>
      <div class="browser-dot"></div>
      <div class="browser-dot"></div>
      <div class="browser-address">https://0x7f-owl-4a9q__%E2%96%91%E2%96%92%E2%96%93///null??404:::/damage</div>
    </div>

    <section class="content">
      <div class="error-block">
        <div class="bang">!</div>
        <div class="code-wrap">
          <div class="code-top">ERROR</div>
          <div class="code-bottom">404</div>
        </div>
      </div>

      <p class="message">🦉Your computer was damaged due to OWL!
🦉您的电脑因OWL而损坏！</p>

      <div class="subhead">Please try contacting the following staff:
请尝试联系下方工作人员：</div>

      <ul class="staff">
        <li>陈经</li>
        <li>非柠</li>
      </ul>

      <div class="ending">Just kidding. The game has ended. Thank you for playing.
开玩笑的。游戏已结束！感谢您的游玩。</div>
    </section>
  </main>
</body>
</html>
