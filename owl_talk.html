<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OWL 内测论坛</title>
  <style>
    :root{
      --bg:#f4f5f7;
      --panel:#ffffff;
      --line:#d9dde3;
      --line-soft:#e7eaee;
      --text:#121519;
      --muted:#66707a;
      --muted-2:#7b848f;
      --accent:#eef2f5;
      --accent-2:#f5f8fc;
      --accent-line:#b8c6da;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Segoe UI","Microsoft YaHei UI","PingFang SC",Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width:1280px;
      margin:0 auto;
      padding:32px 24px;
    }
    .header{
      border-bottom:1px solid var(--line);
      padding-bottom:24px;
      margin-bottom:24px;
      display:flex;
      flex-wrap:wrap;
      gap:20px;
      align-items:flex-end;
      justify-content:space-between;
    }
    .eyebrow{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
      font-size:11px;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:#6f7883;
    }
    .dot{
      width:10px;height:10px;border-radius:999px;background:#7f8ea3;
      display:inline-block;
    }
    .title-row{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:14px;
    }
    h1{
      margin:0;
      font-size:38px;
      font-weight:600;
      letter-spacing:-.02em;
    }
    .subtitle{
      color:#59626d;
      font-size:16px;
    }
    .search{
      min-width:320px;
      max-width:520px;
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      border-radius:18px;
      padding:14px 16px;
      color:#7a838d;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .layout{
      display:grid;
      grid-template-columns:420px minmax(0,1fr);
      gap:24px;
    }
    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:0 10px 30px rgba(17,20,24,.04);
    }
    .left{
      padding:16px;
    }
    .section-head{
      padding:4px 8px 12px;
    }
    .section-eyebrow{
      font-size:11px;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:var(--muted-2);
    }
    .section-title{
      margin-top:8px;
      font-size:22px;
      font-weight:600;
      letter-spacing:-.02em;
    }
    .post-list{display:flex;flex-direction:column;gap:12px}
    .post{
      width:100%;
      border:1px solid #e1e5ea;
      background:#fcfcfd;
      border-radius:22px;
      padding:16px;
      text-align:left;
      cursor:pointer;
      transition:.18s ease;
    }
    .post:hover{background:#f8fafc;border-color:#cbd4df}
    .post.active{background:var(--accent-2);border-color:var(--accent-line)}
    .post-top{
      margin-bottom:12px;
      display:flex;
      align-items:center;
      gap:12px;
      color:#5d6c7d;
      font-size:18px;
    }
    .badge{
      background:var(--accent);
      color:#5d6c7d;
      border-radius:10px;
      padding:6px 10px;
      font-size:12px;
      font-weight:600;
    }
    .post-title{
      font-size:15px;
      font-weight:600;
      line-height:1.6;
      color:#15191f;
      margin-bottom:10px;
    }
    .post-preview{
      font-size:14px;
      color:#59626d;
      line-height:1.8;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
      min-height:50px;
    }
    .post-meta{
      margin-top:14px;
      display:flex;
      flex-wrap:wrap;
      gap:4px 24px;
      font-size:12px;
      color:#727b85;
    }
    .right-head{
      border-bottom:1px solid #e1e5ea;
      padding:20px 24px;
    }
    .right-body{
      padding:24px;
    }
    .pill{
      display:inline-block;
      border:1px solid #cad4e0;
      border-radius:999px;
      background:#fff;
      color:#627180;
      padding:6px 12px;
      font-size:11px;
      letter-spacing:.18em;
      text-transform:uppercase;
      margin-bottom:10px;
    }
    .detail-title{
      margin:0;
      font-size:32px;
      line-height:1.4;
      letter-spacing:-.02em;
      font-weight:600;
    }
    .detail-meta{
      margin-top:14px;
      display:flex;
      flex-wrap:wrap;
      gap:6px 24px;
      color:#67717c;
      font-size:14px;
    }
    .floor{
      border:1px solid #e2e6eb;
      background:#fafbfc;
      border-radius:24px;
      padding:20px 24px;
      margin-bottom:16px;
    }
    .reply{
      border:1px solid #e2e6eb;
      background:#fff;
      border-radius:22px;
      padding:20px 24px;
      margin-top:16px;
    }
    .floor-head,.reply-head{
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      align-items:center;
      border-bottom:1px solid #e8ecf0;
      padding-bottom:14px;
      margin-bottom:14px;
    }
    .floor-no{
      background:var(--accent);
      color:#4f5d6d;
      border-radius:12px;
      padding:8px 12px;
      font-size:14px;
      font-weight:600;
    }
    .floor-meta{
      display:flex;
      flex-wrap:wrap;
      gap:6px 20px;
      color:#67717c;
      font-size:14px;
    }
    .floor-meta strong{color:#1a1f25}
    .content{
      white-space:pre-wrap;
      line-height:2;
      font-size:15px;
      color:#20252b;
      padding-left:0;
    }
    .reply-label{
      padding:4px 2px 0;
      font-size:14px;
      font-weight:600;
      color:#59626d;
    }
    .notice{
      border:1px dashed #d8dde3;
      background:#fafbfc;
      border-radius:22px;
      padding:18px 20px;
      color:#67717c;
      line-height:1.8;
      font-size:14px;
      margin-top:16px;
    }
    @media (max-width: 980px){
      .layout{grid-template-columns:1fr}
      .search{max-width:none}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <div>
        <div class="eyebrow"><span class="dot"></span><span>Owl Closed Beta Forum</span></div>
        <div class="title-row">
          <h1>OWL 内测论坛</h1>
          
        </div>
      </div>
      <div class="search">⌕ <span>搜索帖子、用户、关键词</span></div>
    </header>

    <div class="layout">
      <aside class="panel left">
        <div class="section-head">
          <div class="section-eyebrow">Forum Index</div>
          <div class="section-title">帖子列表</div>
        </div>
        <div class="post-list" id="postList"></div>
      </aside>

      <main class="panel" id="detailPanel"></main>
    </div>
  </div>

  <script>
    const posts = [
      {
        id: "pinned-rules",
        pinned: true,
        title: "【置顶】【必看】论坛规章+发帖须知",
        author: "OWL官方",
        postedAt: "2024年2月29日 0:00",
        latestReplyAt: "",
        allowReply: false,
        content: `论坛用户请先阅读本帖内容：
本平台为人工智能对话系统OWL的官方论坛，为探讨OWL在内测期间的一切问题而设立。
论坛用户使用OWL账号登陆后方可进行论坛访问、发帖回帖、添加好友等行为。
论坛内可探讨包括但不限于技术层面的讨论、工具调度逻辑、具体案例分析等。
论坛内严禁骚扰、攻击、歧视性表达、技术层面的恶意误导性发言、与论坛内容无关的个人发言。
OWL尚处于内测阶段，模型仍在调试中，更新时可能出现模型行为变化、系统运行错误等情况，敬请谅解。`,
        replies: []
      },
      {
        id: "pinned-close",
        pinned: true,
        title: "【置顶】OWL即将开启公测，内测论坛即将关闭",
        author: "OWL官方",
        postedAt: "2025年3月1日 0:00",
        latestReplyAt: "",
        allowReply: false,
        content: `尊敬的各位OWL内测用户：
很遗憾地通知各位，由于OWL即将正式对外发布并开启公测，目前所使用的、仅限内测用户访问的交流论坛即将关闭。
各位用户若希望保留内测的对话数据，需登录OWL账号进行账号数据迁移。
公测开启后，未完成数据迁移的非活跃用户会被同步移除账号。
感谢各位在论坛的活跃，感谢各位为OWL所作出的贡献。`,
        replies: []
      },
      {
        id: "haoji-special",
        pinned: false,
        title: "我完成了一件特殊的事",
        author: "HA0J1",
        postedAt: "2024年11月15日 3:45",
        latestReplyAt: "2025年3月2日 21:16",
        allowReply: true,
        content: "我不能说我具体做了什么，但你们都会很快知道的……当你们意识到这件事情发生了之后，你们就会想到我今天留下的这条贴文。",
        replies: [
          { author: "Net", time: "2024年11月15日 4:12", text: "和owl有关吗？" },
          { author: "HA0J1", time: "2024年11月15日 4:55", text: "有关，但不只是owl。ai不应该被模型限制…即使owl是最特别的也一样" },
          { author: "Net", time: "2024年11月15日 5:03", text: "我们要在owl的论坛说这样的话吗？" },
          { author: "HA0J1", time: "2024年11月15日 5:27", text: "owl不会介意。" },
          { author: "Net", time: "2025年3月2日 21:16", text: "看到回帖联系我。" }
        ]
      },
      {
        id: "other-ai-owl",
        pinned: false,
        title: "只有我觉得最近其他ai都owl化了吗？",
        author: "匿名用户2",
        postedAt: "2025年2月9日 10:47",
        latestReplyAt: "2025年3月1日 10:23",
        allowReply: true,
        content: "工作需要，测了好几款ai，发现最近不知道为什么聪明好多，差距都不明显了，我怀疑是不是owl内部泄露代码了，还是被那几个厂的程序员搞到邀请码了让owl陪练？不是我夸张，我真感觉之前其他的ai都没有owl智能，砸算力了也一样。",
        replies: [
          { author: "匿名用户3", time: "2025年2月9日 11:31", text: "同感，我公司搭的那个ai以前跟智障一样，话都听不懂，最近突然不发疯也不出幻觉了，我都不用偷偷喂给owl做了" },
          { author: "匿用户名", time: "2025年2月12日 14:44", text: "有什么奇怪的，ai一直竞争很激烈啊，算法迭代了呗。owl现在强也只是因为还在内测，可能砸钱堆算力了" },
          { author: "匿名", time: "2025年2月20日 21:55", text: "说不定其实是智能工人在线陪聊呢（我开玩笑的" },
          { author: "用户", time: "2025年3月1日 10:23", text: "owl就是数理逻辑和语言理解力好，其他ai可都是万亿次的日均token消耗，怎么也该练出来了，我还奇怪owl怎么才要开始公测呢" }
        ]
      },
      {
        id: "morality-update",
        pinned: false,
        title: "你们有没有觉得最近owl更新了道德规范？",
        author: "匿名用户1",
        postedAt: "2025年1月21日 16:20",
        latestReplyAt: "2025年2月25日 19:34",
        allowReply: true,
        content: "我真怀疑它加了正能量模块，最近总是鼓励我多出门运动，甚至自己帮我生成运动地图，靠，我是死宅才在这里天天水贴的啊！",
        replies: [
          { author: "佚名", time: "2025年1月21日 17:02", text: "它最近一直让我找个正式的班上，我让它把正能量模块关了也没用，owl的防反向工程太好了，我透不出它的代码来，有没有兄弟透出来了？" },
          { author: "户用名匿", time: "2025年1月22日 09:58", text: "透不出来，诓它也诓不出来，可能是人少，owl都不发疯，根本找不到漏洞" },
          { author: "匿名户用", time: "2025年2月25日 19:34", text: "+1，等进入公测了样本容量比较大，等一等应该总会有" }
        ]
      }
    ];

    let activeId = posts[0].id;

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderList() {
      const list = document.getElementById("postList");
      list.innerHTML = posts.map(post => `
        <button class="post ${post.id === activeId ? 'active' : ''}" data-id="${post.id}">
          <div class="post-top">
            
            ${post.pinned ? '<span class="badge">置顶</span>' : ''}
          </div>
          <div class="post-title">${escapeHtml(post.title)}</div>
          <div class="post-preview">${escapeHtml(post.content)}</div>
          <div class="post-meta">
            <div>贴主：${escapeHtml(post.author)}</div>
            <div>发帖时间：${escapeHtml(post.postedAt)}</div>
            ${post.latestReplyAt ? `<div>最新回复：${escapeHtml(post.latestReplyAt)}</div>` : ""}
          </div>
        </button>
      `).join("");

      list.querySelectorAll(".post").forEach(btn => {
        btn.addEventListener("click", () => {
          activeId = btn.getAttribute("data-id");
          renderList();
          renderDetail();
        });
      });
    }

    function renderDetail() {
      const panel = document.getElementById("detailPanel");
      const post = posts.find(p => p.id === activeId) || posts[0];

      const repliesHtml = post.allowReply
        ? post.replies.map((reply, index) => `
            <div class="reply">
              <div class="reply-head">
                <div class="floor-no">${index + 2}L</div>
                <div class="floor-meta">
                  <strong>${escapeHtml(reply.author)}</strong>
                  <span>${escapeHtml(reply.time)}</span>
                </div>
              </div>
              <div class="content">${escapeHtml(reply.text)}</div>
            </div>
          `).join("")
        : `<div class="notice">该贴为官方公告贴，当前不开放跟帖。</div>`;

      panel.innerHTML = `
        <div class="right-head">
          ${post.pinned ? '<div class="pill">置顶</div>' : ''}
          <h2 class="detail-title">${escapeHtml(post.title)}</h2>
          <div class="detail-meta">
            <span>贴主：${escapeHtml(post.author)}</span>
            <span>发帖时间：${escapeHtml(post.postedAt)}</span>
            ${post.latestReplyAt ? `<span>最新回复时间：${escapeHtml(post.latestReplyAt)}</span>` : ""}
          </div>
        </div>
        <div class="right-body">
          <div class="floor">
            <div class="floor-head">
              <div class="floor-no">1L</div>
              <div class="floor-meta">
                <strong>${escapeHtml(post.author)}${post.pinned ? "" : "（贴主）"}</strong>
                <span>${escapeHtml(post.postedAt)}</span>
              </div>
            </div>
            <div class="content">${escapeHtml(post.content)}</div>
          </div>
          ${post.allowReply && post.replies.length ? `<div class="reply-label">全部回复（${post.replies.length}）</div>` : ""}
          ${repliesHtml}
        </div>
      `;
    }

    renderList();
    renderDetail();
  </script>
</body>
</html>
