<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ChatNow - Net </title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: transparent !important;  /* 背景完全透明，消除黑边 */
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;           /* 取消最小高度限制 */
  margin: 0;
  padding: 0;
}

.phone-frame {
  width: 400px;
  max-width: 100%;
  height: 780px;
  max-height: 90vh;
  background: #f0f2f6;
  border-radius: 32px;
  box-shadow: 0 25px 50px -8px rgba(0,0,0,0.3); /* 适当降低阴影强度，但保留立体感 */
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  /* 确保没有外边距导致黑边 */
  margin: 0 auto;
}

    .chat-header {
      background: #ffffff;
      padding: 14px 18px;
      border-bottom: 1px solid #e0e4e9;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .back-icon {
      font-size: 24px;
      margin-right: 12px;
      color: #007aff;
      font-weight: 300;
    }

    .header-info {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .avatar-small {
      width: 38px;
      height: 38px;
      background: linear-gradient(145deg, #346b99, #1e3a5f);
      border-radius: 50%;
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 500;
      font-size: 16px;
    }

    .contact-name {
      font-weight: 600;
      font-size: 17px;
      color: #1c1e24;
    }

    .menu-icon {
      font-size: 22px;
      color: #007aff;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #f5f7fa;
      position: relative;
    }

    /* 系统消息 */
    .system-message {
      text-align: center;
      margin: 8px 0;
      opacity: 0;
      animation: fadeIn 0.25s forwards;
    }

    .system-bubble {
      display: inline-block;
      background: #d9dde3;
      color: #4e5668;
      font-size: 12px;
      padding: 6px 16px;
      border-radius: 40px;
      max-width: 80%;
    }

    /* 普通消息行 */
    .message-row {
      display: flex;
      width: 100%;
      opacity: 0;
      animation: fadeIn 0.25s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-left {
      justify-content: flex-start;
    }

    .message-right {
      justify-content: flex-end;
    }

    .bubble-wrapper {
      max-width: 82%;
      display: flex;
      flex-direction: column;
    }

    .bubble {
      padding: 12px 15px;
      border-radius: 20px;
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
      position: relative; /* 为选中对勾提供定位 */
    }

    .message-left .bubble {
      background: #ffffff;
      border-bottom-left-radius: 6px;
      color: #1f2329;
      border: 1px solid #e9ecf0;
    }

    .message-right .bubble {
      background: #d0e6ff;
      border-bottom-right-radius: 6px;
      color: #0b1e2e;
      border: 1px solid #b8d2f0;
    }

    /* 图片/链接占位 */
    .image-placeholder {
      margin-top: 6px;
      background: #eef3fc;
      border-radius: 16px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px dashed #6f9fd3;
    }

    .image-icon { font-size: 28px; }
    .image-filename { font-weight: 500; font-size: 14px; color: #1f4970; }
    .image-hint { font-size: 12px; color: #64748b; }

    .link-placeholder {
      margin-top: 6px;
      background: #eef0f5;
      border-radius: 14px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 4px solid #2a6ebb;
    }

    .link-icon { font-size: 22px; }
    .link-content { font-size: 14px; color: #1e3a6b; font-weight: 500; text-decoration: underline; }
    .link-meta { font-size: 12px; color: #5e6f8c; }

    /* ---------- 新增：选中消息效果 ---------- */
    .message-row.selected .bubble {
      outline: 2px solid #007aff;
      outline-offset: 2px;
      background-color: #e6f0ff;
    }

    .message-row.selected .bubble::after {
      content: "✓";
      position: absolute;
      top: -8px;
      right: -8px;
      width: 20px;
      height: 20px;
      background: #007aff;
      color: white;
      font-size: 14px;
      font-weight: bold;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .system-message.selected .system-bubble {
      outline: 2px solid #007aff;
      outline-offset: 2px;
      background-color: #e6f0ff;
    }

    /* ---------- 模拟鼠标光标 ---------- */
    .fake-cursor {
      position: absolute;
      width: 0;
      height: 0;
      pointer-events: none;
      z-index: 999;
      /* Windows 默认箭头（向左上倾斜的三角形） */
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 12px solid #222;
      transform: rotate(-45deg);
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
      transition: left 0.2s ease, top 0.2s ease;
    }

    /* 删除好友渐隐动画 */
    .remove-animation {
      animation: removeBlur 0.4s forwards;
    }

    @keyframes removeBlur {
      0% { filter: blur(0); opacity: 1; }
      100% { filter: blur(6px); opacity: 0.2; transform: scale(0.97); }
    }

    .deleted-header {
      background: #f0f0f0;
      color: #888;
    }
  </style>
</head>
<body>
<div class="phone-frame">
  <div class="chat-header" id="chatHeader">
    <div class="back-icon">←</div>
    <div class="header-info">
      <div class="avatar-small">N</div>
      <div class="contact-name">Net</div>
    </div>
    <div class="menu-icon">⋯</div>
  </div>

  <div class="chat-messages" id="messageList">
    <div class="fake-cursor" id="fakeCursor"></div>
  </div>
</div>

<script>
  (function() {
    // ---------- 历史对话数据 ----------
    const historyMessages = [
      { type: 'system', content: '你们已经添加为好友。' },
      { side: 'right', content: '你好，我注意到你在发帖询问论坛用户HA0J1的去向。能否问一下你和他的关系是？' },
      { side: 'left', content: '我们是网友。' },
      { side: 'right', content: '嗯……他平时上班都很少和人说话，我倒是知道他在网上和人交流，但没问过他在说些什么。' },
      { side: 'left', content: '平时会聊一些技术问题。你是？' },
      { side: 'right', content: '我是他的哥哥。不知道他有没有向你提起过？' },
      { side: 'right', content: '实际上，我也不知道他去哪里了，我们平时不住在一起。' },
      { side: 'right', content: '我也和他失联了，公司说他已经辞职，他现实里又没什么熟人，所以我想着也许你会知道一些情况？' },
      { side: 'right', content: '你会发帖来找他，应该和他关系还不错吧…？' },
      { side: 'right', content: '这应该能证明我的身份了。' },
      { side: 'right', type: 'image', filename: 'birthday.png' },
      { side: 'left', content: '他的确和我说过他有一个大他六岁的哥哥，和他是同一天生日。' },
      { side: 'right', content: '嗯…' },
      { side: 'left', content: '我是3月2日起注意到HA0J1没有正常在OWL论坛活跃的，我尝试联系他，但都失败了。' },
      { side: 'left', content: '我隐约记得他提过公司名字，但又不知道他叫什么，才只能在公司这边的论坛发帖询问。' },
      { side: 'right', content: '我这边找不到他的时间也差不多。而且他前段时间离职了，公司那边也问不到。' },
      { side: 'left', content: '好吧。' },
      { side: 'right', content: '不过OWL是什么？' },
      { side: 'left', content: '是前段时间新研发出的一款人工智能聊天机器人，一直在内测，你不知道也正常。我和他就是在内测论坛上认识的。' },
      { side: 'left', content: '他的OWL账号是HA0J1，如果能登上去，也许可以找到什么。' },
     { side: 'left', type: 'link', linkText: 'OWL 内测登录入口', url: 'https://owl-talk.net' },
      { side: 'left', content: '但我不知道密码，你得自己试。' },
      { side: 'left', content: '他的设备在你那里吗？' },
      { side: 'right', content: '不在。怎么了？' },
      { side: 'left', content: 'OWL的对话可以云端存储，但需要本人生物信息验证才能异地下载。' },
      { side: 'left', content: '你就算成功登陆，也看不见标题之外的对话内容。' },
      { side: 'right', content: '那不就没用了吗？' },
      { side: 'left', content: '不一定。' },
      { side: 'left', content: '你可以尝试和OWL继续对话，一旦触及聊过的关键词，再加以引导，OWL就会把先前的对话内容告诉你。' },
      { side: 'right', content: '有点抽象。你举个具体例子说明一下？' },
      { side: 'left', content: '假设你登录后看到了一个名为“午餐计划”的对话，虽然无法查看之前的记录，但你可以尝试用各种与午餐相关的关键词和OWL继续聊。' },
      { side: 'left', content: '或许在你们聊到麦当劳时，OWL就会表示HA0J1在失踪当天曾要自己协助导航到某地的麦当劳。' },
      { side: 'left', content: '那么你就获得了一条有关他去处的线索。' },
      { side: 'right', content: '差不多明白了。我会试试。' },
      { side: 'left', content: '尝试关键词时，你要尽量保证它们与对话标题有所关联，否则可能问不出什么。' },
      { side: 'left', content: '比如在“午餐计划”中聊餐厅名字，在“学校生活”中聊老师，这样才方便OWL调出云端记忆的内容。' },
      { side: 'left', content: '另外，OWL目前只能记忆同一对话内的上下文。就算你在对话A中提到过关键词X，在对话B中OWL对关键词X仍然不知情。' },
      { side: 'right', content: '好。多谢了。' },
      { side: 'left', content: '不用。有他消息了记得告知我，我如果查到什么也会发你。' },
      { side: 'right', content: '👌' },
    ];

    // ---------- 新消息 ----------
    const newMessages = [
      { side: 'left', content: '你是谁？' },
      { side: 'left', content: '你不是郝纪的哥哥。' },
     { side: 'left', type: 'link', linkText: '瑙珂医院遗体捐献名单', url: 'https://naoke_hospital.com/donation' },
      { side: 'left', content: '你为什么要冒充他和我打听郝纪的事情？' },
      { side: 'left', content: '你要做什么？' },

    ];

    const container = document.getElementById('messageList');
    const headerEl = document.getElementById('chatHeader');
    const fakeCursor = document.getElementById('fakeCursor');

    // 创建消息DOM
    function createMessageElement(item) {
      if (item.type === 'system') {
        const sysRow = document.createElement('div');
        sysRow.className = 'system-message';
        const sysBubble = document.createElement('div');
        sysBubble.className = 'system-bubble';
        sysBubble.textContent = item.content;
        sysRow.appendChild(sysBubble);
        return sysRow;
      }

      const row = document.createElement('div');
      row.className = `message-row ${item.side === 'right' ? 'message-right' : 'message-left'}`;
      
      const wrapper = document.createElement('div');
      wrapper.className = 'bubble-wrapper';
      
      const bubble = document.createElement('div');
      bubble.className = 'bubble';

   if (item.type === 'image') {
    bubble.innerHTML = `
        <img src="birthday.png" 
             alt="生日合影" 
             style="max-width: 100%; border-radius: 12px; display: block;" />
    `;
} else if (item.type === 'link') {
    bubble.innerHTML = `
        <div style="margin-bottom:4px;">🔗 链接</div>
        <div class="link-placeholder">
            <span class="link-icon">🌐</span>
            <div>
                <div class="link-content">${item.linkText}</div>
                <div class="link-meta">${item.url}</div>
            </div>
        </div>
    `;
} else {
        bubble.textContent = item.content;
      }

      wrapper.appendChild(bubble);
      row.appendChild(wrapper);
      return row;
    }

    function appendMessage(item) {
      const el = createMessageElement(item);
      container.appendChild(el);
      container.scrollTop = container.scrollHeight;
    }

function fastScrollToTop(durationMs = 400) {
  return new Promise(resolve => {
    const start = container.scrollTop;
    if (start === 0) return resolve();
    const startTime = performance.now();
    function step(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / durationMs, 1);
      container.scrollTop = start * (1 - progress);
      if (progress < 1) {
        requestAnimationFrame(step);
      } else {
        resolve();
      }
    }
    requestAnimationFrame(step);
  });
}
    function instantScrollToTop() {
      container.scrollTo({ top: 0, behavior: 'instant' });
    }

    // 修正后的光标移动：仅放在消息行左侧固定水平位置，垂直跟随选中消息
    function moveCursorToMessage(messageEl) {
      const containerRect = container.getBoundingClientRect();
      const msgRect = messageEl.getBoundingClientRect();
      const scrollTop = container.scrollTop;

      // 光标固定在聊天区域左侧边缘靠内一点（约8px）
      const cursorX = 8;
      const cursorY = msgRect.top - containerRect.top + scrollTop + msgRect.height / 2;

      fakeCursor.style.left = cursorX + 'px';
      fakeCursor.style.top = cursorY + 'px';
    }

    // 逐条选中所有消息
    function selectMessagesSequence() {
   const allMessages = Array.from(container.querySelectorAll('.message-row'));
      if (allMessages.length === 0) {
        performRemoveFriend();
        return;
      }

      fakeCursor.style.display = 'block';
      let index = 0;

function selectNext() {
    if (index >= allMessages.length) {
        fakeCursor.style.display = 'none';
        setTimeout(() => {
            performRemoveFriend();
        }, 1000);
        return;
    }

    const msg = allMessages[index];
    msg.scrollIntoView({ behavior: 'smooth', block: 'center' });

    // 使用动态延迟，每次调用后缩短
    const delay = Math.max(60, 400 - index * 10); // 从400ms开始，每步减10ms，最低60ms
    setTimeout(() => {
        msg.classList.add('selected');
        moveCursorToMessage(msg);
        index++;
        selectNext(); // 不需要再套一层setTimeout，直接递归
    }, delay);
}
      selectNext();
    }

    // 清空记录并删除好友
    function performRemoveFriend() {
      const allMessages = container.querySelectorAll('.message-row, .system-message');
      allMessages.forEach(msg => msg.classList.add('remove-animation'));

      setTimeout(() => {
        container.innerHTML = '';
        const sysMsg = document.createElement('div');
        sysMsg.className = 'system-message';
        sysMsg.style.opacity = '1';
        const sysBubble = document.createElement('div');
        sysBubble.className = 'system-bubble';
        sysBubble.textContent = '你已删除好友 Net，聊天记录已清空。';
        sysMsg.appendChild(sysBubble);
        container.appendChild(sysMsg);

        headerEl.classList.add('deleted-header');
        document.querySelector('.contact-name').textContent = 'Net (已不是好友)';

      setTimeout(() => {
        // 发送关闭模态框的消息给父窗口
        window.parent.postMessage('closeModal', '*');
    }, 600);
}, 500);
    }

    // 开始新消息逐条弹出
    function startNewMessages() {
      let delay = 1200;
      newMessages.forEach((msg, index) => {
        setTimeout(() => {
          appendMessage(msg);
          if (index === newMessages.length - 1) {
    setTimeout(async () => {
        await fastScrollToTop(400);   // 0.4秒快速滑回顶部
        // 停顿5秒
        await new Promise(r => setTimeout(r, 5000));
        selectMessagesSequence();
    }, 600);
}
        }, delay + index * 1000);
      });
    }

       // 初始化：先渲染历史消息
    historyMessages.forEach(msg => appendMessage(msg));

    // 加入“历史消息”结束提示，然后启动新消息
    setTimeout(() => {
        appendMessage({ type: 'system', content: '—— 以上是历史消息 ——' });
        startNewMessages();   // 提示出现后立即开始新消息流程
    }, 800);
  })();
</script>
</body>
</html>
